[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_sqlite",
  "php82Extensions.sqlite3",
  "php82Extensions.mbstring",
  "php82Extensions.tokenizer",
  "php82Extensions.xml",
  "php82Extensions.ctype",
  "php82Extensions.fileinfo",
  "php82Extensions.curl",
  "php82Extensions.openssl"
]

[phases.install]
cmds = [
  "php -r \"copy('https://getcomposer.org/installer', 'composer-setup.php');\" && php composer-setup.php && php composer.phar install --optimize-autoloader --no-interaction --no-scripts"
]

[phases.build]
dependsOn = ["install"]
cmds = [
  "mkdir -p database storage/framework/sessions storage/framework/views storage/framework/cache storage/logs bootstrap/cache",
  "touch database/database.sqlite",
  "chmod -R 775 storage bootstrap/cache",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache",
  "php artisan migrate --force",
  "php artisan db:seed --force"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8000}"
